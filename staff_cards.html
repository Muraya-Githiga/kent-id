al": 718168382, "Office": 254714128210, "Email": "michaelmugo50@gmail.com", "Website": "www.kent-africa.com", "Address": "16 Muchai Road", "City": "Nairobi", "id_tag": "MICHEALMUGOMURANGIRI"}, {"Name": "Cloudia Jemo", "Title": "Assistant Cost project Mngr", "Personal": 768284870, "Office": 254714128210, "Email": "cloudia.jemo@kent-africa.com", "Website": "www.kent-africa.com", "Address": "16 Muchai Road", "City": "Nairobi", "id_tag": "CLOUDIAJEMO"}, {"Name": "Prisca Mutheu", "Title": "ESG Cordinator", "Personal": 745677474, "Office": 254714128210, "Email": "priscakay0416@gmail.com", "Website": "www.kent-africa.com", "Address": "16 Muchai Road", "City": "Nairobi", "id_tag": "PRISCAMUTHEU"}, {"Name": "Paul Kangethe Kamau", "Title": "Projects", "Personal": 112611978, "Office": 254714128210, "Email": "kangethekamau001@gmail.com ", "Website": "www.kent-africa.com", "Address": "16 Muchai Road", "City": "Nairobi", "id_tag": "PAULKANGETHEKAMAU"}, {"Name": "Jedidah Anyango", "Title": "Projects", "Personal": 748272562, "Office": 254714128210, "Email": "anyangojedida@gmail.com", "Website": "www.kent-africa.com", "Address": "16 Muchai Road", "City": "Nairobi", "id_tag": "JEDIDAHANYANGO"}, {"Name": "Linet Ngina Mutave", "Title": "Projects", "Personal": 740817062, "Office": 254714128210, "Email": "linetmutava@gmail.com", "Website": "www.kent-africa.com", "Address": "16 Muchai Road", "City": "Nairobi", "id_tag": "LINETNGINAMUTAVE"}, {"Name": "Josephine Washalla", "Title": "Projects", "Personal": 790075516, "Office": 254714128210, "Email": "phinywashalla2@gmail.com", "Website": "www.kent-africa.com", "Address": "16 Muchai Road", "City": "Nairobi", "id_tag": "JOSEPHINEWASHALLA"}, {"Name": "Rodney Njuguna", "Title": "Projects", "Personal": 797180091, "Office": 254714128210, "Email": "rodney.njuguna@kent-africa.com", "Website": "www.kent-africa.com", "Address": "16 Muchai Road", "City": "Nairobi", "id_tag": "RODNEYNJUGUNA"}, {"Name": "Peter Kimeli", "Title": "HSSEQ Implementor $ Inspe         const container = document.getElementById('container');

        function showCard() {
            // Get the ID from the URL (the part after the #)
            const currentTag = window.location.hash.substring(1).toUpperCase();
            
            document.querySelectorAll('.card').forEach(c => {
                if (!currentTag || c.id === currentTag) {
                    c.classList.add('active');
                } else {
                    c.classList.remove('active');
                }
            });
        }

        data.forEach(s => {
            const div = document.createElement('div');
            div.className = 'card';
            div.id = s.id_tag; // This matches the QR code tag
            
            div.innerHTML = `
                <div class="header">
                    <img src="photos/${s.Name}.jpg" class="profile-img" onerror="this.src='https://ui-avatars.com/api/?name=${s.Name}'">
                    <h2>${s.Name}</h2>
                    <p>${s.Title}</p>
                </div>
                <div class="info">
                    <p><b>Phone:</b> ${s.Personal}</p>
                    <p><b>Office:</b> ${s.Office}</p>
                    <p><b>Email:</b> ${s.Email}</p>
                </div>
                <div class="btn-row">
                    <button class="btn save" onclick="downloadV('${s.Name}','${s.Personal}','${s.Email}')">Save Contact</button>
                    <button class="btn copy" onclick="copyE('${s.Email}')">Copy Email</button>
                </div>
            `;
            container.appendChild(div);
        });

        function downloadV(n,p,e){
            const v = `BEGIN:VCARD\nVERSION:3.0\nFN:${n}\nTEL:${p}\nEMAIL:${e}\nEND:VCARD`;
            const b = new Blob([v],{type:'text/vcard'});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(b); a.download = n+'.vcf'; a.click();
        }
        function copyE(e){ navigator.clipboard.writeText(e); alert('Copied!'); }

        window.onhashchange = showCard;
        showCard();
    </script>
