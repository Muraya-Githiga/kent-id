    <meta charset="UTF-8">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #4a90e2; --teal: #7ec8b5; --dark: #0a2540; }
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; margin: 0; padding: 40px; display: flex; flex-wrap: wrap; gap: 30px; justify-content: center; }
        
        .card-wrapper { 
            width: 360px; background: white; border-radius: 15px; overflow: hidden; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); position: relative;
        }

        .header-gradient {
            background: linear-gradient(180deg, var(--teal) 0%, var(--primary) 100%);
            height: 200px; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white;
        }

        .profile-img {
            width: 100px; height: 100px; border-radius: 50%; border: 4px solid white;
            object-fit: cover; margin-bottom: 10px; background: #eee;
        }

        .header-gradient h2 { margin: 0; font-size: 1.2rem; text-transform: uppercase; }
        .header-gradient p { margin: 5px 0 0; font-size: 0.85rem; opacity: 0.9; }

        .action-bar { display: flex; justify-content: center; gap: 15px; margin-top: -25px; }
        .action-btn {
            width: 50px; height: 50px; border-radius: 50%; background: white; 
            display: flex; align-items: center; justify-content: center;
            color: var(--primary); box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            text-decoration: none;
        }

        .details-section { padding: 30px 20px; }
        .info-item { display: flex; align-items: center; padding: 12px 0; border-bottom: 1px solid #f9f9f9; }
        .info-icon { width: 35px; color: var(--primary); }
        .info-text label { display: block; font-size: 0.6rem; color: #bbb; text-transform: uppercase; }
        .info-text span { font-size: 0.9rem; color: #333; font-weight: 500; }

        .footer-actions { display: flex; }
        .footer-btn { flex: 1; padding: 18px; border: none; font-weight: 600; cursor: pointer; color: white; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-add { background: var(--dark); }
        .btn-copy { background: var(--primary); }
    </style>
</head>
